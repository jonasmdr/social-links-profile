<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
  
  <main>
    <section id="panel">
      <figure class="conteiner-image">
        <img src="assets/images/avatar-jessica.jpeg" alt="Imagem de uma mulher">

      <p id="name">Jessica Randall</p>

      <p>"Front-end developer and avid reader."</p>
      <div id="conteiner">
        <ul>
          <li><a href="https://github.com/" target="_blank">GitHub</a></li>
          <li><a href="https://www.frontendmentor.io/home" target="_blank">Frontend Mentor</a></li>
          <li><a href="https://www.linkedin.com/feed/a" target="_blank">LinkedIn</a></li>
          <li><a href="https://x.com/?lang=en" target="_blank">Twitter</a></li>
          <li><a href="https://www.instagram.com/" target="_blank">Instagram</a></li>
        </ul>
      </div>
    </section>
  </main>
